            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            height: 400px;
            border: 2px solid #ffcc00;
            border-radius: 30px;
            background-color: transparent;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            padding: 20px 0;
        }
        h1 {
            font-family: '微软雅黑', sans-serif;
            font-size: 36px;
            color: #ffcc00;
            text-align: center;
            margin: 0 0 5px 0;
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
        }
        .hint-top {
            color: #888;
            font-size: 10px;
            font-family: '微软雅黑', sans-serif;
            text-align: center;
            position: absolute;
            top: 80px;
            left: 0;
            right: 0;
            margin: 0;
        }
        .click-img {
            transition: opacity 0.6s ease;
            display: block;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            margin-top: 0;
            outline: none;
        }
        .answer-area {
            position: absolute;
            text-align: center;
            color: #ffcc00;
            opacity: 0;
            /* 默认过渡会在显示时被 JS 重新设置，重置时会临时移除 */
            transition: opacity 0.6s ease;
            pointer-events: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            width: 85%;
            font-family: '微软雅黑', sans-serif;
            line-height: 1.5;
            word-wrap: break-word;
            padding: 20px;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 20px;
        }
        .hint-bottom {
            color: #888;
            font-size: 10px;
            font-family: '微软雅黑', sans-serif;
            text-align: center;
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
        }

            color: #000;
            border: none;
            border-radius: 30px;
            padding: 8px 20px;
            font-size: 14px;
            font-family: '微软雅黑', sans-serif;
            cursor: pointer;
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            transition: background 0.3s;
            display: none;
            z-index: 10;
            font-weight: bold;
            outline: none;

        const resetBtn = document.getElementById('resetBtn');
        const hintBottom = document.querySelector('.hint-bottom');
        let clicked = false;

            img.style.opacity = '0';
            setTimeout(() => {
                const answerText = getRandomSentence();
                answerBox.textContent = answerText;

                resetBtn.style.display = 'block';
